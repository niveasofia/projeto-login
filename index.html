  <body class="text-center">
    <main class="form-signin"> 
      <form> <!-- DEFINE UM FORMULÁRIO -->
        <img class="mb-4" src="imagens/logo01.png" alt="" width="150" height="150">

        <div class="form-floating"> <!-- EFEITO - TEXTO "FLUTUA"-->
          <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
          <label for="floatingInput">Informe o email:</label>
        </div>  <!-- INPUT (CAIXA DE TEXTO), type="email" == VALIDA @ NO EMAIL-->

        <div class="form-floating">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
          <label for="floatingPassword">Informe a senha:</label>
        </div>

        <div class="checkbox mb-3">
          <label>
            <input type="checkbox" value="remember-me"> Mantenha-me conectado
          </label>
        </div> <!-- button - BOTÃO DE AÇÃO, CLASSES w-100 (LARGURA) btn-primary (AZUL)-->

        <button class="w-100 btn btn-lg btn-primary" type="submit">Entrar</button>
      </form>

    </main>

    <a class="btn btn-primary btn-fly" href="faq.html" role="button">FAQ</a> <!--BOTÃO FAQ-->
